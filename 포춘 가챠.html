<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 운세</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0a1628;
    --bg-mid: #0f2244;
    --bg-light: #1a3a6e;
    --accent-cyan: #4dd9ff;
    --accent-gold: #ffd700;
    --accent-pink: #ff6eb4;
    --accent-green: #39ff8f;
    --accent-purple: #b36eff;
    --text-main: #e8f4ff;
    --text-dim: #7aa8cc;
    --glass: rgba(255,255,255,0.06);
    --glass-border: rgba(77,217,255,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Press Start 2P', monospace;
    background: var(--bg-deep);
    color: var(--text-main);
    min-height: 100vh;
    overflow-x: hidden;
    cursor: default;
  }

  /* ── STAR CANVAS ── */
  #stars-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ── NEBULA GLOW ── */
  .nebula {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    pointer-events: none;
    z-index: 0;
  }
  .nebula-1 { width: 600px; height: 400px; background: radial-gradient(circle, #3a6fd8, transparent); top: -100px; left: -150px; }
  .nebula-2 { width: 500px; height: 500px; background: radial-gradient(circle, #6b2fa0, transparent); bottom: -80px; right: -100px; }
  .nebula-3 { width: 350px; height: 350px; background: radial-gradient(circle, #1a7a9e, transparent); top: 40%; left: 50%; }

  /* ── SCREENS ── */
  .screen {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    transition: opacity 0.6s, transform 0.6s;
  }
  .screen.hidden {
    display: none;
  }

  /* ── TITLE ── */
  .page-title {
    font-size: clamp(22px, 4vw, 38px);
    color: var(--accent-cyan);
    text-shadow:
      0 0 10px var(--accent-cyan),
      0 0 30px rgba(77,217,255,0.5),
      0 0 60px rgba(77,217,255,0.2);
    letter-spacing: 4px;
    text-align: center;
    margin-bottom: 8px;
    animation: titlePulse 3s ease-in-out infinite;
  }
  @keyframes titlePulse {
    0%,100% { text-shadow: 0 0 10px var(--accent-cyan), 0 0 30px rgba(77,217,255,0.5); }
    50% { text-shadow: 0 0 20px var(--accent-cyan), 0 0 60px rgba(77,217,255,0.8), 0 0 100px rgba(77,217,255,0.3); }
  }

  .page-subtitle {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    margin-bottom: 50px;
    text-align: center;
  }

  /* ── GACHA MACHINE ── */
  .gacha-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
  }

  .gacha-machine {
    width: 260px;
    height: 320px;
    position: relative;
    cursor: pointer;
    transition: transform 0.2s;
    filter: drop-shadow(0 0 20px rgba(77,217,255,0.3));
  }
  .gacha-machine:hover { transform: scale(1.03); }
  .gacha-machine:active { transform: scale(0.97); }

  .gacha-machine svg {
    width: 100%;
    height: 100%;
  }

  /* ── CAPSULE INSIDE MACHINE ── */
  .capsule-display {
    animation: floatCapsule 2.5s ease-in-out infinite;
  }
  @keyframes floatCapsule {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  /* ── TURN HANDLE ANIMATION ── */
  .handle-group {
    transform-origin: 198px 220px;
    transition: transform 0.1s;
  }
  .handle-spinning {
    animation: spinHandle 0.5s ease-in-out;
  }
  @keyframes spinHandle {
    0% { transform: rotate(0deg); }
    40% { transform: rotate(120deg); }
    70% { transform: rotate(100deg); }
    100% { transform: rotate(0deg); }
  }

  /* ── BUTTON ── */
  .gacha-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    padding: 16px 36px;
    background: linear-gradient(135deg, #1a3a6e, #0f2244);
    border: 2px solid var(--accent-cyan);
    color: var(--accent-cyan);
    cursor: pointer;
    letter-spacing: 2px;
    position: relative;
    overflow: hidden;
    transition: all 0.2s;
    box-shadow: 0 0 15px rgba(77,217,255,0.3), inset 0 0 15px rgba(77,217,255,0.05);
    text-transform: uppercase;
  }
  .gacha-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(77,217,255,0.1));
    opacity: 0;
    transition: opacity 0.2s;
  }
  .gacha-btn:hover { box-shadow: 0 0 30px rgba(77,217,255,0.6), inset 0 0 20px rgba(77,217,255,0.1); transform: translateY(-2px); }
  .gacha-btn:hover::before { opacity: 1; }
  .gacha-btn:active { transform: translateY(1px); }
  .gacha-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .disclaimer {
    font-size: 16px;
    color: var(--text-dim);
    text-align: center;
    letter-spacing: 1px;
    margin-top: 40px;
    opacity: 0.7;
    line-height: 1.8;
  }

  /* ── RESULT SCREEN ── */
  #result-screen {
    gap: 30px;
  }

  .result-card {
    max-width: 500px;
    width: 100%;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    padding: 36px 30px;
    position: relative;
    text-align: center;
    backdrop-filter: blur(10px);
    animation: cardReveal 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes cardReveal {
    from { opacity: 0; transform: scale(0.6) translateY(30px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .result-card::before, .result-card::after {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    border-color: var(--accent-cyan);
    border-style: solid;
  }
  .result-card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .result-card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  .grade-badge {
    display: inline-block;
    font-size: 10px;
    padding: 6px 14px;
    letter-spacing: 3px;
    margin-bottom: 20px;
    position: relative;
  }

  .grade-SSR { color: #ffd700; border: 1px solid #ffd700; box-shadow: 0 0 20px rgba(255,215,0,0.5); text-shadow: 0 0 10px #ffd700; }
  .grade-SR  { color: #ff6eb4; border: 1px solid #ff6eb4; box-shadow: 0 0 20px rgba(255,110,180,0.5); text-shadow: 0 0 10px #ff6eb4; }
  .grade-R   { color: #b36eff; border: 1px solid #b36eff; box-shadow: 0 0 20px rgba(179,110,255,0.5); text-shadow: 0 0 10px #b36eff; }
  .grade-N   { color: #4dd9ff; border: 1px solid #4dd9ff; box-shadow: 0 0 15px rgba(77,217,255,0.4); }
  .grade-UC  { color: #39ff8f; border: 1px solid #39ff8f; box-shadow: 0 0 15px rgba(57,255,143,0.4); text-shadow: 0 0 10px #39ff8f; }

  .capsule-emoji {
    font-size: 64px;
    display: block;
    margin: 10px 0 20px;
    animation: bounceIn 0.6s 0.2s cubic-bezier(0.34,1.56,0.64,1) both;
    filter: drop-shadow(0 0 12px currentColor);
  }
  @keyframes bounceIn {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  .fortune-title {
    font-size: 14px;
    margin-bottom: 20px;
    line-height: 1.8;
    animation: fadeUp 0.5s 0.5s both;
  }
  .fortune-text {
    font-size: 9px;
    color: var(--text-dim);
    line-height: 2.2;
    animation: fadeUp 0.5s 0.7s both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .lucky-items {
    margin-top: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    animation: fadeUp 0.5s 0.9s both;
  }
  .lucky-tag {
    font-size: 8px;
    padding: 5px 10px;
    background: rgba(77,217,255,0.08);
    border: 1px solid rgba(77,217,255,0.2);
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .back-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    padding: 12px 24px;
    background: transparent;
    border: 1px solid var(--text-dim);
    color: var(--text-dim);
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .back-btn:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }

  /* ── PARTICLES ── */
  .particle-burst {
    position: fixed;
    pointer-events: none;
    z-index: 100;
  }

  /* ── SCANLINES overlay ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.04) 2px,
      rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  /* ── GRADE GLOW RING ── */
  .grade-SSR .capsule-emoji { filter: drop-shadow(0 0 20px gold); }
  .grade-SR  .capsule-emoji { filter: drop-shadow(0 0 20px #ff6eb4); }
  .grade-R   .capsule-emoji { filter: drop-shadow(0 0 18px #b36eff); }

  /* ── PIXEL CORNERS on machine ── */
  .machine-frame {
    image-rendering: pixelated;
  }
</style>
</head>

<!-- ══════════ MAIN SCREEN ══════════ -->

<script>
// ── STARS ──────────────────────────────────────────────
const canvas = document.getElementById('stars-canvas');
const ctx = canvas.getContext('2d');
let stars = [];

function initStars() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  stars = [];
  for (let i = 0; i < 200; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5 + 0.3,
      alpha: Math.random(),
      speed: Math.random() * 0.3 + 0.05,
      twinkle: Math.random() * Math.PI * 2
    });
  }
}

function animateStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const t = Date.now() * 0.001;
  stars.forEach(s => {
    const a = 0.4 + 0.6 * Math.abs(Math.sin(t * s.speed + s.twinkle));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,230,255,${a * s.alpha})`;
    ctx.fill();
  });
  requestAnimationFrame(animateStars);
}

window.addEventListener('resize', initStars);
initStars();
animateStars();

      '강력한 행운의 기운이 당신을 감싸고 있습니다. 포기하지 않았던 일에서 빛나는 결실을 맺게 됩니다.',

    texts: [
      '인간관계에서 좋은 인연이 찾아올 것입니다. 평소보다 조금 더 용기를 내어보세요.',
      '기분 좋은 소식과 함께 하루가 시작됩니다. 소중한 사람과 따뜻한 시간을 보내세요.',
    ],
    lucky: [['방향: 서쪽', '색상: 분홍', '숫자: 3', '아이템: 장미'],
             ['방향: 남쪽', '색상: 빨강', '숫자: 5', '아이템: 하트']],
    chance: 15
  },
  {
    id: 'R', label: '★ R ★',
    emoji: '🔮',
    color: 'grade-R',
    titles: ['신비로운 기운이 흐릅니다', '변화의 바람이 붑니다', '내면의 힘을 깨우세요'],
    texts: [
      '새로운 관점으로 사물을 바라보면 뜻밖의 해답을 찾게 됩니다. 직감을 믿어보세요.',
      '작은 변화가 큰 전환점이 됩니다. 지금까지의 노력이 서서히 빛을 발하기 시작합니다.',
    ],
    lucky: [['방향: 북서', '색상: 보라', '숫자: 9', '아이템: 수정'],
             ['방향: 남서', '색상: 남색', '숫자: 6', '아이템: 달빛']],
    chance: 25
  },
  {
    id: 'UC', label: '◆ UC ◆',
    emoji: '🌿',
    color: 'grade-UC',
    titles: ['차분한 기운이 감돕니다', '성실함이 빛을 발합니다', '꾸준함이 답입니다'],
    texts: [
      '오늘은 무리하기보다 자신을 돌보는 하루를 만들어보세요. 작은 친절이 돌아옵니다.',
      '평범한 일상 속에 숨은 행복을 발견하게 됩니다. 감사한 마음을 가져보세요.',
    ],
    lucky: [['방향: 동북', '색상: 초록', '숫자: 4', '아이템: 네잎클로버'],
             ['방향: 동남', '색상: 하늘', '숫자: 2', '아이템: 이슬']],
    chance: 25
  },
  {
    id: 'N', label: '◇ N ◇',
    emoji: '🌊',
    color: 'grade-N',
    titles: ['평온한 하루가 기다립니다', '잔잔한 물결 같은 하루', '여유로운 기운이 함께합니다'],
    texts: [
      '급하게 서두르지 않아도 됩니다. 오늘은 천천히, 하나씩 처리하는 것이 최선입니다.',

    ],

             ['방향: 북쪽', '색상: 하얀', '숫자: 0', '아이템: 구름']],
    chance: 30
  }
];

function pickGrade() {
  const r = Math.random() * 100;
  let cumulative = 0;
  for (const g of grades) {
    cumulative += g.chance;
    if (r < cumulative) return g;
  }
  return grades[grades.length - 1];
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ── PARTICLE BURST ──────────────────────────────────────
function burst(x, y, color) {
  const container = document.createElement('div');
  container.className = 'particle-burst';
  container.style.left = x + 'px';
  container.style.top = y + 'px';
  document.body.appendChild(container);

  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    const angle = (i / 18) * 360;
    const dist = 60 + Math.random() * 80;
    const size = 3 + Math.random() * 5;
    p.style.cssText = `
      position:absolute; width:${size}px; height:${size}px;
      background:${color}; border-radius:50%;
      transform:translate(-50%,-50%);
      animation: particle-fly 0.8s ease-out forwards;
      --dx:${Math.cos(angle * Math.PI/180) * dist}px;
      --dy:${Math.sin(angle * Math.PI/180) * dist}px;
    `;
    container.appendChild(p);
  }

  // inject keyframe once
  if (!document.getElementById('particle-kf')) {
    const style = document.createElement('style');
    style.id = 'particle-kf';
    style.textContent = `
      @keyframes particle-fly {
        0%   { transform: translate(-50%,-50%) translate(0,0); opacity:1; }
        100% { transform: translate(-50%,-50%) translate(var(--dx),var(--dy)); opacity:0; }
      }
    `;
    document.head.appendChild(style);
  }

  setTimeout(() => container.remove(), 900);
}

// ── NAVIGATION ──────────────────────────────────────────
function startGacha() {
  const btn = document.getElementById('main-draw-btn');
  const handle = document.getElementById('handle-group');
  btn.disabled = true;

  // spin handle
  handle.classList.add('handle-spinning');
  handle.addEventListener('animationend', () => {
    handle.classList.remove('handle-spinning');
  }, { once: true });

  setTimeout(() => {
    showResult();
    btn.disabled = false;
  }, 600);
}

function showResult() {
  const grade = pickGrade();
  const title = pick(grade.titles);
  const text = pick(grade.texts);
  const lucky = pick(grade.lucky);

  const card = document.getElementById('result-card');
  card.className = 'result-card ' + grade.color;
  card.innerHTML = `
    <div class="grade-badge ${grade.color}">${grade.label}</div>
    <span class="capsule-emoji">${grade.emoji}</span>
    <div class="fortune-title">${title}</div>
    <div class="fortune-text">${text}</div>
    <div class="lucky-items">
      ${lucky.map(t => `<span class="lucky-tag">${t}</span>`).join('')}
    </div>
  `;

  document.getElementById('main-screen').classList.add('hidden');
  document.getElementById('result-screen').classList.remove('hidden');

  // burst effect
  const colors = { SSR:'#ffd700', SR:'#ff6eb4', R:'#b36eff', UC:'#39ff8f', N:'#4dd9ff' };
  burst(window.innerWidth/2, window.innerHeight/2, colors[grade.id]);
}

function goBack() {
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('main-screen').classList.remove('hidden');
}

// also allow clicking the machine
document.getElementById('gacha-machine').addEventListener('click', startGacha);
</script>
